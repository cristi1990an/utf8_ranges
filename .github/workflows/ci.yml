name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild utf8_ranges.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Run tests
        run: .\x64\Release\utf8_ranges.exe
