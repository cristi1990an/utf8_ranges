name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  msvc:
    name: MSVC (C++23)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild utf8_ranges.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Run tests
        run: .\x64\Release\utf8_ranges.exe

  linux:
    name: ${{ matrix.name }} (C++23)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: utf8_ranges_gcc
          - name: Clang trunk
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output: utf8_ranges_clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: ${{ matrix.cxx }} --version

      - name: Build
        run: ${{ matrix.cxx }} -std=c++23 -O2 -Wall -Wextra -pedantic ${{ matrix.cxxflags }} source.cpp -o ${{ matrix.output }}

      - name: Run tests
        run: ./${{ matrix.output }}
