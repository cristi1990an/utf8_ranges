name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  msvc:
    name: MSVC (${{ matrix.configuration }}, C++23)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
          - configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild unicode_ranges.vcxproj /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=v143 /p:TreatWarningAsError=true

      - name: Run tests
        run: .\x64\${{ matrix.configuration }}\unicode_ranges.exe

  clang-cl:
    name: Clang-cl (${{ matrix.configuration }}, C++23)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
          - configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild unicode_ranges.vcxproj /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=ClangCL /p:TreatWarningAsError=true

      - name: Run tests
        run: .\x64\${{ matrix.configuration }}\unicode_ranges.exe

  linux:
    name: ${{ matrix.name }} (${{ matrix.opt_name }}${{ matrix.sanitizer_name }}, C++23)
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.install_kind == 'clang' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o0
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o2
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o3
            opt_name: O3
            opt_flags: "-O3"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o0_san
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o2_san
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output: unicode_ranges_gcc_o3_san
            opt_name: O3
            opt_flags: "-O3"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output: unicode_ranges_clang_o0
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output: unicode_ranges_clang_o2
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output: unicode_ranges_clang_o0_san
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output: unicode_ranges_clang_o2_san
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: ${{ matrix.cxx }} --version

      - name: Build
        run: ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} ${{ matrix.sanitizer_flags }} source.cpp -o ${{ matrix.output }}

      - name: Run tests
        run: ./${{ matrix.output }}
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}

  docs-examples:
    name: Docs examples (${{ matrix.name }}, C++23)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            output_dir: build/docs-examples-gcc
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            output_dir: build/docs-examples-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: ${{ matrix.cxx }} --version

      - name: Compile docs examples
        id: compile_docs_examples
        continue-on-error: ${{ matrix.install_kind == 'gcc' }}
        run: bash tools/compile_docs_examples.sh ${{ matrix.cxx }} ${{ matrix.output_dir }} -O0 -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }}

      - name: Note GCC docs-example formatting limitation
        if: steps.compile_docs_examples.outcome == 'failure' && matrix.install_kind == 'gcc'
        run: |
          {
            echo "## Docs examples (GCC)"
            echo
            echo "libstdc++ 14 does not currently support direct \`std::print\` / \`std::format\` formatting for these custom range views."
            echo "The GCC docs-example job is therefore informational and non-blocking."
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Coverage (Clang, libc++, C++23)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang coverage toolchain
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 llvm-22 llvm-22-tools libc++-22-dev libc++abi-22-dev

      - name: Show tool versions
        run: |
          clang++-22 --version
          llvm-cov-22 --version
          llvm-profdata-22 --version

      - name: Generate coverage
        run: bash tools/generate_coverage.sh

      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage/report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  benchmarks:
    name: Benchmark (${{ matrix.name }}, ${{ matrix.opt_name }}, C++23)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: ""
            opt_name: O3
            opt_flags: "-O3 -DNDEBUG"
            output: unicode_ranges_benchmarks_gcc_o3
            artifact_name: benchmark-gcc-o3
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++"
            opt_name: O2
            opt_flags: "-O2 -DNDEBUG"
            output: unicode_ranges_benchmarks_clang_o2
            artifact_name: benchmark-clang-o2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: ${{ matrix.cxx }} --version

      - name: Build benchmark runner
        run: ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} unicode_ranges_benchmarks.cpp -o ${{ matrix.output }}

      - name: Run benchmark suite
        run: ./${{ matrix.output }} --min-ms=300 > benchmark-results.txt

      - name: Publish benchmark summary
        run: |
          {
            echo "## Benchmarks (${{ matrix.name }}, ${{ matrix.opt_name }})"
            echo
            echo "_Shared CI runners are noisy; treat these as directional numbers._"
            echo
            echo '```text'
            cat benchmark-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: benchmark-results.txt
